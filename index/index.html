<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Win a Free Drink!</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#111;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.card{

max-width:450px;
width:100%;

background:#1d1d1d;
padding:30px;

border-radius:20px;

box-shadow:0 0 25px rgba(255,215,0,.15);

text-align:center;
}

h1{

color:#FFD700;
margin-bottom:15px;

}

p{

margin-bottom:25px;
line-height:1.5;

}

.question{

font-size:24px;
font-weight:bold;
margin-bottom:25px;

}

button{

width:100%;

padding:18px;

margin:10px 0;

border:none;

border-radius:12px;

font-size:18px;

cursor:pointer;

background:#333;

color:white;

transition:.25s;

}

button:hover{

background:#FFD700;

color:black;

}

.correct{

color:#65ff87;

font-size:30px;

margin-bottom:15px;

}

.wrong{

color:#ff6363;

font-size:28px;

margin-bottom:15px;

}

.timer{

font-size:50px;

margin:20px 0;

color:#FFD700;

}

small{

color:#bbb;

}

</style>

</head>

<body>

<div class="card" id="app"></div>

<script>

const questions=[

{
question:"In which place did Amelia work the longest?",
answers:["x","y","z"],
correct:0
},

{
question:"What is the name of Amelia's university studies?",
answers:["abc","efg","hij"],
correct:1
},

{
question:"How many tattoos does Amelia have?",
answers:["6","7","67"],
correct:2
}

];

const randomQuestion=questions[Math.floor(Math.random()*questions.length)];

const app=document.getElementById("app");

showQuestion();

function showQuestion(){

app.innerHTML=`
<h1>🍸 Win a Free Drink!</h1>

<p>Answer correctly to receive your free drink.</p>

<div class="question">${randomQuestion.question}</div>

`;

randomQuestion.answers.forEach((answer,index)=>{

const btn=document.createElement("button");

btn.innerText=String.fromCharCode(65+index)+". "+answer;

btn.onclick=()=>checkAnswer(index);

app.appendChild(btn);

});

}

function checkAnswer(choice){

if(choice===randomQuestion.correct){

let seconds=60;

app.innerHTML=`

<div class="correct">

🎉 Correct!

</div>

<p>

Show this screen to the bartender.

</p>

<div class="timer" id="timer">

60

</div>

<small>

Reward expires in 60 seconds.

</small>

`;

const timer=document.getElementById("timer");

const interval=setInterval(()=>{

seconds--;

timer.innerText=seconds;

if(seconds<=0){

clearInterval(interval);

app.innerHTML=`

<h1>🍸 Time expired</h1>

<p>

Please scan the QR code again.

</p>

`;

}

},1000);

}

else{

app.innerHTML=`

<div class="wrong">

❌ Wrong answer

</div>

<p>

Better luck next time!

</p>

`;

}

}

</script>

</body>
</html>
